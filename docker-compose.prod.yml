version: "3.7"
services:
  php-fpm:
    image: php:7.3.8-fpm
    volumes:
      - ./:/var/www/html
    restart: always
    links:
      - db
  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/vhost.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    links:
      - php-fpm
    restart: always
    ports:
      - {http_port}:80
  db:
    image: mysql:8.0.17
    volumes:
      - ./db:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: {mysql_root_pwd}
      MYSQL_USER: {mysql_user}
      MYSQL_PASSWORD: {mysql_password}
