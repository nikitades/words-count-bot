version: "3.3"
services:
  php-fpm:
    image: php:7.3.8-fpm
    user: "${UID}:${GID}"
    volumes:
      - ./:/var/www/html
    restart: always
  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/vhost.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    links:
      - php-fpm
    restart: always
    ports:
      - 8080:80